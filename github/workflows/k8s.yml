name: Build and Deploy to Kubenetes

on:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        user: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t siridetwongnarat/myapp:latest .

      - name: Push Image
        run: docker push siridetwongnarat/myapp:latest
